[graph]
all-features = true

[advisories]
version = 2
ignore = [
  # tokio v1 - awaiting upstream fix
  "RUSTSEC-2026-0007",
  # tokio-tar - archived, used by testcontainers (dev only)
  "RUSTSEC-2025-0066",
  # tar path traversal variants - testcontainers (dev only)
  "RUSTSEC-2024-0421",
  "RUSTSEC-2024-0437",
  "RUSTSEC-2025-0134",
  # rustls CRL matching logic - awaiting upstream fix
  "RUSTSEC-2025-0111",
  "RUSTSEC-2026-0009",
  # xml-rs stack exhaustion - transitive via testcontainers
  "RUSTSEC-2026-0049",
]

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "OpenSSL",
  "BSL-1.0",
  "Unicode-DFS-2016",
  "MPL-2.0",
  "CDLA-Permissive-2.0",
  "CC0-1.0",
]

# taxbyte itself has no published license
[[licenses.exceptions]]
allow = ["GPL-3.0-or-later"]
name = "actix-governor"

[licenses.private]
ignore = true
registries = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
